<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>See You Tomorrow</title>
<style>
  :root{
    --bg:#0c0c0c;
    --fg:#c9c9c9;
    --Cyrene:#FFC0CB;
    --dim:#E6E6FA;
    --cursor:#F6A6C1;
  }

 *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg);
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    color:var(--fg);
  }
  #term{
    height:100%;
    padding:20px 24px;
    overflow-y:auto;
    font-size:15px;
    line-height:1.6;
    cursor:text;
  }
  .line{ white-space:pre-wrap; word-break:break-word; }
  .prompt-user{ color:var(--green); }
  .prompt-sep{ color:var(--dim); }
  .path{ color:#7dd3fc; }
  .hint{ color:var(--dim); }
  #inputRow{ display:flex; align-items:center; }
  #cmdForm{ flex:1; display:flex; margin:0; padding:0; }
  #cmdInput{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--fg);
    font-family:inherit;
    font-size:16px;
    caret-color:var(--green);
    padding:0;
    margin:0;
    -webkit-appearance:none;
  }

  @media (max-width: 480px){
    #term{
      font-size: 13px;
      padding: 14px 16px;
    }
  }

  .redirecting{ color:var(--green); }
</style>
</head>
<body>

<div id="term">
  <div class="line hint">Ketik perintah lalu tekan Enter. Coba: console.log("Hello, World!");</div>
  <div id="history"></div>
  <div id="inputRow">
    <span class="prompt-user">harits</span><span class="prompt-sep">@</span><span class="path">console</span><span class="prompt-sep">:~$&nbsp;</span>
    <form id="cmdForm" autocomplete="off">
      <input id="cmdInput" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="text" enterkeyhint="send">
    </form>
  </div>
</div>

<script>
  const term = document.getElementById('term');
  const history = document.getElementById('history');
  const cmdForm = document.getElementById('cmdForm');
  const cmdInput = document.getElementById('cmdInput');

  const VIDEO_URL = "https://youtu.be/LB_65-rOYYo";
  let redirecting = false;

  function normalize(s){
    return s.replace(/\s+/g,'').replace(/'/g,'"').toLowerCase();
  }
  const TARGET = normalize('console.log("Hello, World!");');

  function addHistoryLine(text, cls){
    const div = document.createElement('div');
    div.className = 'line' + (cls ? ' ' + cls : '');
    div.textContent = text;
    history.appendChild(div);
  }

  function runCommand(cmd){
    addHistoryLine('harits@console:~$ ' + cmd);
    const trimmed = cmd.trim();
    if(trimmed === ''){ return; }

    if(normalize(trimmed) === TARGET){
      addHistoryLine('> ' + trimmed.match(/"([^"]+)"/)[1]);
      addHistoryLine('Membuka ' + VIDEO_URL + ' ...', 'redirecting');
      redirecting = true;
      cmdInput.disabled = true;
      setTimeout(()=>{ window.location.href = VIDEO_URL; }, 700);
      return;
    }

    if(normalize(trimmed).startsWith('console.log(')){
      const match = trimmed.match(/console\.log\(\s*["'](.*)["']\s*\)\s*;?/);
      if(match){
        addHistoryLine('> ' + match[1]);
        return;
      }
    }

    if(trimmed === 'clear'){
      history.innerHTML = '';
      return;
    }

    if(trimmed === 'help'){
      addHistoryLine('Perintah yang dikenal: console.log("..."); | clear | help');
      return;
    }

    addHistoryLine(`bash: ${trimmed}: command not found`, 'hint');
  }

  cmdForm.addEventListener('submit', (e)=>{
    e.preventDefault();
    if(redirecting) return;
    runCommand(cmdInput.value);
    cmdInput.value = '';
    term.scrollTop = term.scrollHeight;
  });

  term.addEventListener('click', ()=> cmdInput.focus());
  window.addEventListener('load', ()=> cmdInput.focus());
</script>

</body>
</html>
